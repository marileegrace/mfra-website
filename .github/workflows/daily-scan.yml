name: MFRA Daily Scan

on:
  schedule:
    # Mon-Fri at 4:15 PM ET (21:15 UTC)
    - cron: '15 21 * * 1-5'
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run MFRA scanner
        run: python generate_json.py

      - name: Commit results if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/scan_results.json
          git diff --cached --quiet || git commit -m "Scan $(date +%Y-%m-%d)"
          git push
